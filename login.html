<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping With Me - Login</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#ff9966,#ff5e62);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

.login-box h1{
    color:#ff5e62;
    margin-bottom:10px;
}

.login-box p{
    color:gray;
    margin-bottom:25px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.btn{
    width:100%;
    padding:12px;
    background:#ff5e62;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#ff9966;
}

.signup-link{
    margin-top:15px;
}

.signup-link a{
    text-decoration:none;
    color:#ff5e62;
    font-weight:bold;
}
</style>
</head>

<body>
<a href="login.php"></a>
<div class="login-box">

    <h1>🛍 Shopping With Me</h1>
    <p>Login To Your Account</p>

    <form action="service_pg.html" method="get">

        <input type="email" name="email"
        class="input-box"
        placeholder="Enter Email" required>

        <input type="password" name="password"
        class="input-box"
        placeholder="Enter Password" required>

        <button type="submit" class="btn">
            Login
        </button>

    </form>

    <div class="signup-link">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>

</div>

</body>
</html>
